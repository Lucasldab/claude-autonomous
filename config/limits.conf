# Autonomous runner limits — sourced by bin/runner.sh
# Adjust without touching scripts.

# Max wall-clock per session (seconds). Claude Pro/Max 5hr window = 18000.
# Stay well under so Claude has time to checkpoint.
MAX_SESSION_SECONDS=14400

# Hard stop on turn count (claude --max-turns)
MAX_TURNS=80

# Weekly budget cap (millions of tokens, rough). Stop runner if exceeded.
# Claude reports usage in transcript; we estimate from session log size.
WEEKLY_TOKEN_CAP_M=40

# Away-hours window. Runner refuses to start outside this unless FORCE=1.
# 24h format. Set START=END to disable window check.
AWAY_HOUR_START=23
AWAY_HOUR_END=7

# Branch policy: 'feature-only' (default), 'allow-main'
BRANCH_POLICY=feature-only

# Push to remote after work? 0=no, 1=yes
ALLOW_PUSH=1

# Open PR after push? 0=no, 1=yes
ALLOW_PR=1

# Model for autonomous runs
CLAUDE_MODEL=claude-sonnet-4-6

# Notifications. ntfy.sh = phone push (no account; subscribe to topic in ntfy app).
# Topic is random to keep it private. Desktop uses notify-send.
NTFY_SERVER=https://ntfy.sh
NTFY_TOPIC=lucas-claude-606a83de50697360600802c3
DESKTOP_NOTIFY=1
